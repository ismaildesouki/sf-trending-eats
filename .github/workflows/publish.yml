name: Weekly Publish

on:
  schedule:
    # Every Tuesday at 9am Pacific (4pm UTC)
    - cron: "0 16 * * 2"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run weekly publish
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BEEHIIV_API_KEY: ${{ secrets.BEEHIIV_API_KEY }}
          BEEHIIV_PUBLICATION_ID: ${{ secrets.BEEHIIV_PUBLICATION_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python pipeline/run_weekly_publish.py

      - name: Commit dashboard data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/lib/data/ openclaw/weekly_content.json
          git diff --staged --quiet || git commit -m "chore: update weekly trending data [skip ci]"
          git push
